<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Layout Analysis</title>
    <style>
        :root {
            --fg: #111;
            --muted: #666;
            --line: #e6e6e6;
            --bg: #f9f9f9;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            margin: 0;
            color: var(--fg);
            background: #fff;
        }
        header {
            padding: 16px 24px 12px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        header h1 { margin: 0; font-size: 18px; flex: 1; }
        button, #file-input-label {
            padding: 7px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: var(--bg);
            cursor: pointer;
            font-size: 13px;
        }
        button:active, #file-input-label:active { transform: translateY(1px); }
        #file { display: none; }
        #status { font-size: 13px; color: var(--muted); }

        main { padding: 20px 24px; }

        /* ── Tabs ─────────────────────────────────────────────────────── */
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--line); }
        .tab-btn {
            padding: 8px 18px;
            border: none;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: var(--muted);
            border-radius: 0;
        }
        .tab-btn.active { border-bottom-color: #2563eb; color: #2563eb; font-weight: 600; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Page card (used inside slot previews) ────────────────────────── */
        .page-card {
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
            background: var(--bg);
        }
        .page-card-title {
            padding: 8px 12px;
            font-size: 13px; font-weight: 600;
            border-bottom: 1px solid var(--line);
            background: #fff;
        }
        .page-card-sub {
            padding: 2px 12px 6px;
            font-size: 11px; color: var(--muted);
            background: #fff;
        }
        .page-card svg { display: block; }

        /* ── Similarity matrix wraps ──────────────────────────────────────── */
        .matrix-wrap { overflow-x: auto; }
        .matrix-wrap table {
            border-collapse: collapse;
            font-size: 12px;
        }
        .matrix-wrap th, .matrix-wrap td {
            padding: 5px 8px;
            border: 1px solid var(--line);
            white-space: nowrap;
        }
        .matrix-wrap th { background: var(--bg); font-weight: 600; }
        .matrix-wrap td { text-align: center; min-width: 52px; }

        /* ── Global filter bar ─────────────────────────────────────────── */
        #filter-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 0 14px; margin-bottom: 18px;
            border-bottom: 1px solid var(--line); flex-wrap: wrap;
        }
        #filter-bar label { font-size: 12px; font-weight: 600; }
        /* ── Template filter combobox ──────────────────────────────────────── */
        .tmpl-filter { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
        .filter-anchor { position: relative; }
        .filter-btn { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
        .filter-panel {
            position: absolute; top: calc(100% + 4px); left: 0; z-index: 100;
            background: #fff; border: 1px solid #ccc; border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            padding: 6px 0; min-width: 230px; max-height: 280px; overflow-y: auto;
        }
        .filter-panel label {
            display: flex; align-items: center; gap: 8px;
            padding: 5px 14px; font-size: 12px; cursor: pointer; user-select: none;
        }
        .filter-panel label:hover { background: var(--bg); }
        .small-link {
            background: none; border: none; cursor: pointer;
            font-size: 12px; color: #2563eb; padding: 0; text-decoration: underline;
        }

        /* ── Section headings ──────────────────────────────────────────────── */
        .section-head {
            font-size: 13px; font-weight: 700; margin: 22px 0 6px;
            border-bottom: 1px solid var(--line); padding-bottom: 5px; color: var(--fg);
        }
        .section-head:first-of-type { margin-top: 0; }
        .section-desc { font-size: 12px; color: var(--muted); margin: 0 0 10px; }

        /* ── Family hierarchy ──────────────────────────────────────────────── */
        .family-list { list-style: none; margin: 0; padding: 0; }
        .family-list > li {
            margin-bottom: 14px;
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
        }
        .family-header {
            padding: 10px 14px;
            background: var(--bg);
            border-bottom: 1px solid var(--line);
        }
        .family-header-row1 {
            display: flex; align-items: baseline; flex-wrap: wrap; gap: 6px;
            margin-bottom: 4px;
        }
        .family-header-row2 {
            font-size: 12px; color: var(--muted);
        }
        .proposed-label {
            font-size: 11px; color: var(--muted); font-weight: 400;
        }
        .proposed-id {
            font-size: 13px; font-weight: 700; color: #2563eb;
        }
        .family-header .muted-note { color: var(--muted); font-weight: 400; font-size: 12px; }
        .family-slots { padding: 6px 0; }
        .family-slot {
            border-bottom: 1px solid var(--line);
        }
        .family-slot:last-child { border-bottom: none; }
        .slot-row {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 6px 14px; cursor: pointer; user-select: none;
        }
        .slot-row:hover { background: #f5f8ff; }
        .slot-num {
            min-width: 22px; height: 22px; border-radius: 50%;
            background: #e8f0fe; color: #2563eb;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
        }
        .slot-expand-icon {
            margin-left: auto; font-size: 11px; color: var(--muted);
            flex-shrink: 0; align-self: center;
        }
        .orig-pages { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; flex: 1; }
        .orig-page {
            background: #f0f0f0; border-radius: 4px;
            padding: 2px 7px; font-size: 12px;
        }
        /* Expandable SVG preview area */
        .slot-preview {
            display: none;
            flex-wrap: wrap;
            gap: 16px;
            padding: 10px 14px 14px 46px;
            background: #fafbff;
            border-top: 1px dashed var(--line);
        }
        .slot-preview.open { display: flex; }
        .preview-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }
        .preview-card-title {
            padding: 4px 8px;
            font-size: 11px; font-weight: 600;
            border-bottom: 1px solid var(--line);
            background: var(--bg);
        }
        .preview-card svg { display: block; }
        code {
            background: #f0f0f0;
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 12px;
        }

        code.dimmed { color: #bbb; background: #fafafa; border: 1px solid #e8e8e8; }

        #empty { color: var(--muted); font-size: 14px; padding: 40px 0; }
    </style>
</head>
<body>
<header>
    <h1>Layout Analysis</h1>
    <label id="file-input-label" for="file">📂 Load JSON…</label>
    <input type="file" id="file" accept=".json" />
        <div id="status">No file loaded — use the button above to open a <code>*-layout.json</code> file.</div>
</header>

<main id="main">
    <div id="empty">Load a JSON file to begin.</div>

    <div id="app" hidden>
        <div class="tabs">
            <button class="tab-btn active" data-tab="families">Template Families</button>
            <button class="tab-btn" data-tab="similarity">Similarity</button>
        </div>

        <!-- Global template filter — applies to all tabs -->
        <div id="filter-bar">
            <label>Templates:</label>
            <div class="filter-anchor">
                <button class="filter-btn" id="filter-btn">All templates ▾</button>
                <div class="filter-panel" id="filter-panel" hidden></div>
            </div>
            <button class="small-link" id="filter-all">all</button>
            <span style="color:var(--muted);font-size:12px">·</span>
            <button class="small-link" id="filter-none">none</button>
        </div>

        <!-- Similarity tab -->
        <div class="tab-panel" id="tab-similarity">
            <div class="section-head">Template similarity</div>
            <p class="section-desc" id="tmpl-matrix-desc"></p>
            <div class="matrix-wrap" id="tmpl-matrix-wrap"></div>

            <div class="section-head">Page similarity</div>
            <p class="section-desc" id="page-matrix-desc"></p>
            <div class="matrix-wrap" id="page-matrix-wrap"></div>
        </div>

        <!-- Families tab -->
        <div class="tab-panel active" id="tab-families">
            <p class="section-desc" id="families-desc"></p>
            <ul class="family-list" id="families-list"></ul>
        </div>
    </div>
</main>

<script>
// ── Palette ───────────────────────────────────────────────────────────────────
const PALETTE = [
    "#4e79a7","#f28e2b","#e15759","#76b7b2","#59a14f",
    "#edc948","#b07aa1","#ff9da7","#9c755f","#bab0ac",
    "#aecbeb","#ffcfa1","#f4a59d","#b0dbd8","#a8d5a2",
];

// ── State ─────────────────────────────────────────────────────────────────────
let gData              = null;
let selectedTmplIds    = new Set();   // template IDs currently checked in the filter

// ── File loading ──────────────────────────────────────────────────────────────
document.getElementById("file").addEventListener("change", async (e) => {
    const [file] = e.target.files;
    if (!file) return;
    try {
        const data = JSON.parse(await file.text());
        document.getElementById("status").textContent =
            `${file.name}  ·  ${data.pages.length} page(s)  ·  project: ${data.projectName}`;
        render(data);
    } catch (err) {
        document.getElementById("status").textContent = "Error: " + err.message;
    }
});

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
    });
});

// ── Template filter combobox ──────────────────────────────────────────────────
const filterBtn   = document.getElementById("filter-btn");
const filterPanel = document.getElementById("filter-panel");

filterBtn.addEventListener("click", e => {
    filterPanel.hidden = !filterPanel.hidden;
    e.stopPropagation();
});
document.addEventListener("click", () => { filterPanel.hidden = true; });
filterPanel.addEventListener("click", e => e.stopPropagation());

document.getElementById("filter-all").addEventListener("click", () => {
    filterPanel.querySelectorAll("input[type=checkbox]").forEach(cb => {
        cb.checked = true;
        selectedTmplIds.add(cb.dataset.id);
    });
    updateFilterBtn();
    if (gData) rerender();
});
document.getElementById("filter-none").addEventListener("click", () => {
    filterPanel.querySelectorAll("input[type=checkbox]").forEach(cb => { cb.checked = false; });
    selectedTmplIds.clear();
    updateFilterBtn();
    if (gData) rerender();
});

function buildFilterPanel(templates) {
    filterPanel.innerHTML = "";
    templates.forEach(t => {
        const label = document.createElement("label");
        const cb    = document.createElement("input");
        cb.type = "checkbox"; cb.checked = true; cb.dataset.id = t.templateId;
        cb.addEventListener("change", () => {
            if (cb.checked) selectedTmplIds.add(t.templateId);
            else selectedTmplIds.delete(t.templateId);
            updateFilterBtn();
            if (gData) rerender();
        });
        label.appendChild(cb);
        label.appendChild(document.createTextNode(" " + t.templateName));
        filterPanel.appendChild(label);
    });
}

function updateFilterBtn() {
    const total = gData?.similarity?.templateLevel?.templates?.length ?? 0;
    filterBtn.textContent = selectedTmplIds.size === total
        ? `All templates (${total}) ▾`
        : `${selectedTmplIds.size} of ${total} templates ▾`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(data) {
    gData = data;
    document.getElementById("empty").hidden = true;
    document.getElementById("app").hidden   = false;

    const tl = data.similarity?.templateLevel;
    if (tl) {
        selectedTmplIds = new Set(tl.templates.map(t => t.templateId));
        buildFilterPanel(tl.templates);
        updateFilterBtn();
    } else {
        document.getElementById("filter-bar").style.display = "none";
    }

    rerender();
}

function rerender() {
    renderSimilarity(gData);
    renderFamilies(gData);
}

// ── Page card builder (used inline in slot previews) ─────────────────────────
const CANVAS_W = 180;   // narrower for inline previews
const PAD      = 10;

function buildPageCard(page) {
    const areas = page.areas;
    if (!areas.length) {
        const card = document.createElement("div");
        card.className = "page-card";
        card.innerHTML = `<div class="page-card-title">${esc(page.pageName)}</div>
                          <div class="page-card-sub" style="padding-bottom:12px">No areas</div>`;
        return card;
    }

    const maxX2 = Math.max(...areas.map(a => a.x + a.w));
    const maxY2 = Math.max(...areas.map(a => a.y + a.h));
    const refW  = Math.max(maxX2, 210);
    const scale = (CANVAS_W - 2 * PAD) / refW;
    const svgH  = Math.ceil(maxY2 * scale + 2 * PAD);
    const svg   = svgEl("svg", { width: CANVAS_W, height: svgH, style: "background:#fff;cursor:default" });

    (page.proximityGroups || []).forEach((grp, gi) => {
        const b = grp.bbox;
        svg.appendChild(svgEl("rect", {
            x: sc(b.x, scale), y: sc(b.y, scale), width: sd(b.w, scale), height: sd(b.h, scale),
            fill: "none", stroke: "#e00", "stroke-width": 1.5, "stroke-dasharray": "5,3"
        }));
        const lbl = svgEl("text", { x: sc(b.x, scale) + 2, y: sc(b.y, scale) - 2,
            "font-size": 7, fill: "#e00", "font-weight": "bold" });
        lbl.textContent = `G${gi + 1}`;
        svg.appendChild(lbl);
    });

    areas.forEach((a, i) => {
        const color = PALETTE[i % PALETTE.length];
        const isTop = a.containedIn == null;
        const rx = sc(a.x, scale), ry = sc(a.y, scale), rw = sd(a.w, scale), rh = sd(a.h, scale);
        const label = shortLabel(a.contentPreview) || `area_${i}`;
        const tip   = `${label}\nx=${a.x}mm  y=${a.y}mm  w=${a.w}mm  h=${a.h}mm`
                    + (a.flowToNextPage ? "\n[flowToNextPage]" : "")
                    + (a.interactiveFlowName ? `\nflow: ${a.interactiveFlowName}` : "");

        const rect = svgEl("rect", {
            x: rx, y: ry, width: rw, height: rh,
            fill: color, "fill-opacity": "0.32", stroke: color,
            "stroke-width": isTop ? "1.5" : "1",
            "stroke-dasharray": isTop ? "none" : "3,2"
        });
        const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
        title.textContent = tip;
        rect.appendChild(title);
        svg.appendChild(rect);

        if (rw > 12 && rh > 8) {
            const txt = svgEl("text", { x: rx + 2, y: ry + 9,
                "font-size": 6.5, fill: "#222", "pointer-events": "none" });
            txt.textContent = label.length > 28 ? label.slice(-28) : label;
            svg.appendChild(txt);
        }
    });

    const card = document.createElement("div");
    card.className = "page-card";
    const tmplInfo = page.templateName
        ? `  ·  tmpl: ${esc(page.templateName)}` +
          (page.templatePageIndex != null ? ` (pg ${page.templatePageIndex + 1})` : "")
        : "";
    card.innerHTML =
        `<div class="page-card-title">${esc(page.pageName)}</div>` +
        `<div class="page-card-sub">${areas.length} area(s)${tmplInfo}</div>`;
    card.appendChild(svg);
    return card;
}

// ── Similarity (both matrices, filtered by selected templates) ────────────────
function renderSimilarity(data) {
    const tl = data.similarity?.templateLevel;
    const pl = data.similarity?.pageLevel || data.similarity;

    // ── Template matrix ──
    const tmplWrap = document.getElementById("tmpl-matrix-wrap");
    const tmplDesc = document.getElementById("tmpl-matrix-desc");
    if (tl) {
        const selIdx = tl.templates.map((t, i) => selectedTmplIds.has(t.templateId) ? i : -1).filter(i => i >= 0);
        if (selIdx.length > 0) {
            tmplDesc.textContent =
                "Compares templates by positional page matching (page 1↔1, 2↔2, …). " +
                "Templates with different page counts are penalised for unmatched pages. Score 1.0 = identical, 0.0 = nothing in common.";
            buildMatrixTable(tmplWrap,
                selIdx.map(i => tl.templates[i].templateName),
                selIdx.map(i => selIdx.map(j => tl.matrix[i][j])));
        } else {
            tmplDesc.textContent = "";
            tmplWrap.innerHTML = "<p style='color:var(--muted);font-size:13px'>No templates selected.</p>";
        }
    } else {
        tmplDesc.textContent = "";
        tmplWrap.innerHTML = "<p style='color:var(--muted);font-size:13px'>Template-level data not available (old JSON format).</p>";
    }

    // ── Page matrix — only pages from selected templates ──
    const pageWrap = document.getElementById("page-matrix-wrap");
    const pageDesc = document.getElementById("page-matrix-desc");
    let selPageIdx = [];

    if (tl && selectedTmplIds.size > 0) {
        const seen = new Set();
        tl.templates.filter(t => selectedTmplIds.has(t.templateId))
            .forEach(t => t.pageIndices.forEach(pi => { if (!seen.has(pi)) { seen.add(pi); selPageIdx.push(pi); } }));
        selPageIdx.sort((a, b) => a - b);
    } else if (!tl) {
        selPageIdx = data.pages.map((_, i) => i);
    }

    if (selPageIdx.length > 0) {
        // Sort pages by family order so similar pages cluster on the diagonal
        const pl2 = data.similarity?.pageLevel || data.similarity;
        const familyOrder = buildFamilyPageOrder(data, selPageIdx);
        const orderedIdx  = familyOrder.length === selPageIdx.length ? familyOrder : selPageIdx;

        pageDesc.textContent =
            "Compares pages by area structure (x + width normalised to page width, height with 3× tolerance). " +
            "Score 1.0 = identical structure, 0.0 = nothing in common. Pages sorted by proposed family.";
        buildMatrixTable(pageWrap,
            orderedIdx.map(i => data.pages[i].pageName),
            orderedIdx.map(i => orderedIdx.map(j => pl.matrix[i][j])));
    } else {
        pageDesc.textContent = "";
        pageWrap.innerHTML = "<p style='color:var(--muted);font-size:13px'>No pages to display.</p>";
    }
}

function buildMatrixTable(wrap, names, matrix) {
    const n = names.length;
    if (n === 0) { wrap.innerHTML = ""; return; }

    const table = document.createElement("table");
    const hrow  = table.createTHead().insertRow();
    hrow.insertCell().innerHTML = "<th></th>";
    names.forEach((name, j) => {
        const th = document.createElement("th");
        th.title = name; th.textContent = `${j + 1}`;
        hrow.appendChild(th);
    });

    const tbody = table.createTBody();
    names.forEach((name, i) => {
        const row = tbody.insertRow();
        const th  = document.createElement("th");
        th.textContent = `${i + 1}. ${name.slice(0, 36)}`;
        row.appendChild(th);
        matrix[i].forEach((score, j) => {
            const td = row.insertCell();
            if (i === j) {
                td.textContent = "—"; td.style.background = "#e8e8e8";
            } else {
                td.textContent = score.toFixed(2);
                const g = Math.round(200 * score), r = Math.round(255 * (1 - score));
                td.style.background = `rgb(${r},${g},80)`;
                if (score >= 0.60) td.style.fontWeight = "700";
            }
        });
    });

    wrap.innerHTML = "";
    wrap.appendChild(table);
    const note = document.createElement("p");
    note.style.cssText = "font-size:11px;color:var(--muted);margin-top:6px";
    note.textContent = "Green = high similarity · Bold = same family (≥ 0.60). Numbers match row/column headers.";
    wrap.appendChild(note);
}

// ── Template families (templates-first, expandable slot previews) ─────────────
function renderFamilies(data) {
    const tl   = data.similarity?.templateLevel;
    const pl   = data.similarity?.pageLevel || data.similarity;
    const list = document.getElementById("families-list");
    const desc = document.getElementById("families-desc");
    list.innerHTML = "";

    if (!tl) {
        // Fallback: old JSON — flat page families
        desc.textContent = "Pages grouped by structural similarity into base-template candidates.";
        pl.families.forEach((fam, fi) => {
            const li = document.createElement("li");
            const isUnique = fam.pageIds.length === 1;
            li.innerHTML =
                `<div class="family-header">` +
                `<div class="family-header-row1">` +
                `<span class="proposed-label">Proposed</span>` +
                `<span class="proposed-id">Base Template ${fi + 1}</span>` +
                (isUnique ? `<span class="muted-note">(unique)</span>` : "") + `</div></div>` +
                `<div class="family-slots"><div class="family-slot"><div class="slot-row">` +
                `<span class="orig-pages">${fam.pageNames.map(n => `<span class="orig-page">${esc(n)}</span>`).join("")}</span>` +
                `</div></div></div>`;
            list.appendChild(li);
        });
        return;
    }

    desc.textContent =
        "Templates (top) lead to a proposed base template. " +
        "Numbered rows are proposed base template pages — click a row to preview the original pages that would merge into it.";

    const tmplById = Object.fromEntries(tl.templates.map(t => [t.templateId, t]));
    let   familyCounter = 0;

    tl.families.forEach((fam) => {
        if (!fam.templateIds.some(id => selectedTmplIds.has(id))) return;
        familyCounter++;

        const isUnique     = fam.templateIds.length === 1;
        const famTemplates = fam.templateIds.map(id => tmplById[id]).filter(Boolean);
        const multiTmpl    = famTemplates.length > 1;

        const allPageIdx = famTemplates.flatMap(t => t.pageIndices);
        allPageIdx.sort((a, b) => a - b);

        const clusters = clusterByMatrix(allPageIdx, pl.matrix);
        clusters.sort((a, b) => Math.min(...a) - Math.min(...b));

        const labelOf = pi => {
            const pageName = data.pages[pi].pageName;
            if (!multiTmpl) return pageName;
            for (const t of famTemplates) {
                if (t.pageIndices.includes(pi)) return `${t.templateName} / ${pageName}`;
            }
            return pageName;
        };

        // Templates-first badges row
        const tmplBadges = fam.templateIds.map((id, idx) =>
            `<code${selectedTmplIds.has(id) ? "" : ' class="dimmed"'}>${esc(fam.templateNames[idx])}</code>`
        ).join("  ");

        const li = document.createElement("li");

        let headerHtml =
            `<div class="family-header">` +
            `<div class="family-header-row1">${tmplBadges}` +
            `<span style="margin-left:auto;display:flex;align-items:baseline;gap:5px">` +
            `<span class="proposed-label">→ Proposed</span>` +
            `<span class="proposed-id">Base Template ${familyCounter}</span>` +
            (isUnique ? `<span class="muted-note">(unique)</span>` : "") +
            `</span></div>` +
            `<div class="family-header-row2">${clusters.length} page slot(s) · ${allPageIdx.length} original page(s) · click a slot to preview</div>` +
            `</div>`;

        let slotsHtml = '<div class="family-slots">';
        clusters.forEach((cluster, ci) => {
            const slotId  = `slot-${familyCounter}-${ci}`;
            const badges  = cluster.map(pi =>
                `<span class="orig-page">${esc(labelOf(pi))}</span>`).join("");
            slotsHtml +=
                `<div class="family-slot" data-slot-id="${slotId}">` +
                `<div class="slot-row" onclick="toggleSlotPreview(this)">` +
                `<span class="slot-num">${ci + 1}</span>` +
                `<span class="orig-pages">${badges}</span>` +
                `<span class="slot-expand-icon">▶</span>` +
                `</div>` +
                `<div class="slot-preview" id="${slotId}"></div>` +
                `</div>`;
        });
        slotsHtml += "</div>";

        li.innerHTML = headerHtml + slotsHtml;

        // Attach page indices to each slot for lazy SVG building
        li.querySelectorAll(".family-slot").forEach((slotEl, ci) => {
            slotEl.dataset.pageIndices = JSON.stringify(clusters[ci]);
        });

        list.appendChild(li);
    });

    if (familyCounter === 0) {
        list.innerHTML = "<p style='color:var(--muted);font-size:13px'>No families match the current filter.</p>";
    }
}

function toggleSlotPreview(rowEl) {
    const slotEl   = rowEl.closest(".family-slot");
    const preview  = slotEl.querySelector(".slot-preview");
    const icon     = rowEl.querySelector(".slot-expand-icon");
    const isOpen   = preview.classList.toggle("open");
    icon.textContent = isOpen ? "▼" : "▶";

    if (isOpen && preview.childElementCount === 0) {
        // Lazy-build SVG cards
        const pageIndices = JSON.parse(slotEl.dataset.pageIndices || "[]");
        pageIndices.forEach(pi => {
            const page = gData.pages[pi];
            const wrap = document.createElement("div");
            wrap.className = "preview-card";
            const title = document.createElement("div");
            title.className = "preview-card-title";
            title.textContent = page.pageName;
            wrap.appendChild(title);
            const card = buildPageCard(page);
            // Extract just the SVG from the card
            const svg = card.querySelector("svg");
            if (svg) wrap.appendChild(svg);
            preview.appendChild(wrap);
        });
    }
}

/** Build a family-ordered list of page indices for matrix sorting. */
function buildFamilyPageOrder(data, selPageIdx) {
    const tl = data.similarity?.templateLevel;
    if (!tl) return selPageIdx;
    const pl = data.similarity?.pageLevel || data.similarity;
    const selSet = new Set(selPageIdx);
    const order  = [];
    const seen   = new Set();

    tl.families.forEach(fam => {
        if (!fam.templateIds.some(id => selectedTmplIds.has(id))) return;
        const tmplById   = Object.fromEntries(tl.templates.map(t => [t.templateId, t]));
        const famPageIdx = fam.templateIds.flatMap(id => tmplById[id]?.pageIndices ?? [])
                               .filter(pi => selSet.has(pi));
        famPageIdx.sort((a, b) => a - b);
        const clusters = clusterByMatrix(famPageIdx, pl.matrix);
        clusters.sort((a, b) => Math.min(...a) - Math.min(...b));
        clusters.forEach(cluster => cluster.forEach(pi => { if (!seen.has(pi)) { seen.add(pi); order.push(pi); } }));
    });

    // Append any remaining pages not captured by families
    selPageIdx.forEach(pi => { if (!seen.has(pi)) order.push(pi); });
    return order;
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function sc(mm, scale) { return Math.round((mm * scale + PAD) * 10) / 10; }  // position (adds PAD)
function sd(mm, scale) { return Math.round(mm * scale * 10) / 10; }           // dimension (no PAD)

/** Single-linkage clustering of page list indices using the global page-level similarity matrix. */
function clusterByMatrix(indices, matrix, threshold = 0.60) {
    let clusters = indices.map(i => [i]);
    let changed  = true;
    while (changed) {
        changed = false;
        for (let i = 0; i < clusters.length && !changed; i++) {
            for (let j = i + 1; j < clusters.length && !changed; j++) {
                if (clusters[i].some(a => clusters[j].some(b => (matrix[a]?.[b] ?? 0) >= threshold))) {
                    clusters[i].push(...clusters[j]);
                    clusters.splice(j, 1);
                    changed = true;
                }
            }
        }
    }
    return clusters;
}

function svgEl(tag, attrs) {
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    return el;
}

function shortLabel(preview) {
    if (!preview) return "";
    const m = preview.match(/\(([^)]+)\)$/);
    return m ? m[1] : preview.slice(0, 40);
}

function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
