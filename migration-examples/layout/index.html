<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Layout Analysis</title>
    <style>
        :root {
            --fg: #111;
            --muted: #666;
            --line: #e6e6e6;
            --bg: #f9f9f9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            margin: 0;
            color: var(--fg);
            background: #fff;
        }

        header {
            padding: 16px 24px 12px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            flex: 1;
        }

        button, #file-input-label {
            padding: 7px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: var(--bg);
            cursor: pointer;
            font-size: 13px;
        }

        button:active, #file-input-label:active {
            transform: translateY(1px);
        }

        #file {
            display: none;
        }

        #status {
            font-size: 13px;
            color: var(--muted);
        }

        main {
            padding: 20px 24px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--line);
        }

        .tab-btn {
            padding: 8px 18px;
            border: none;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: var(--muted);
            border-radius: 0;
        }

        .tab-btn.active {
            border-bottom-color: #2563eb;
            color: #2563eb;
            font-weight: 600;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .page-card {
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
            background: var(--bg);
        }

        .page-card-title {
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            border-bottom: 1px solid var(--line);
            background: #fff;
        }

        .page-card-sub {
            padding: 2px 12px 6px;
            font-size: 11px;
            color: var(--muted);
            background: #fff;
        }

        .page-card svg {
            display: block;
        }

        .matrix-wrap {
            overflow-x: auto;
        }

        .matrix-wrap table {
            border-collapse: collapse;
            font-size: 12px;
        }

        .matrix-wrap th, .matrix-wrap td {
            padding: 5px 8px;
            border: 1px solid var(--line);
            white-space: nowrap;
        }

        .matrix-wrap th {
            background: var(--bg);
            font-weight: 600;
        }

        .matrix-wrap td {
            text-align: center;
            min-width: 52px;
        }

        #filter-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0 14px;
            margin-bottom: 18px;
            border-bottom: 1px solid var(--line);
            flex-wrap: wrap;
        }

        #filter-bar label {
            font-size: 12px;
            font-weight: 600;
        }

        .filter-anchor {
            position: relative;
        }

        .filter-btn {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 6px;
        }

        .filter-panel {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            z-index: 100;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            padding: 6px 0;
            min-width: 230px;
            max-height: 280px;
            overflow-y: auto;
        }

        .filter-panel label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
        }

        .filter-panel label:hover {
            background: var(--bg);
        }

        .small-link {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: #2563eb;
            padding: 0;
            text-decoration: underline;
        }

        .section-head {
            font-size: 13px;
            font-weight: 700;
            margin: 22px 0 6px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 5px;
            color: var(--fg);
        }

        .section-head:first-of-type {
            margin-top: 0;
        }

        .section-desc {
            font-size: 12px;
            color: var(--muted);
            margin: 0 0 10px;
        }

        .family-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .family-list > li {
            margin-bottom: 14px;
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
        }

        .family-header {
            padding: 10px 14px;
            background: var(--bg);
            border-bottom: 1px solid var(--line);
        }

        .family-header-row1 {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
        }

        .family-header-row2 {
            font-size: 12px;
            color: var(--muted);
        }

        .proposed-label {
            font-size: 11px;
            color: var(--muted);
            font-weight: 400;
        }

        .proposed-id {
            font-size: 13px;
            font-weight: 700;
            color: #2563eb;
        }

        .family-header .muted-note {
            color: var(--muted);
            font-weight: 400;
            font-size: 12px;
        }

        .family-slots {
            padding: 6px 0;
        }

        .family-slot {
            border-bottom: 1px solid var(--line);
        }

        .family-slot:last-child {
            border-bottom: none;
        }

        .slot-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 6px 14px;
            cursor: pointer;
            user-select: none;
        }

        .slot-row:hover {
            background: #f5f8ff;
        }

        .slot-num {
            min-width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #e8f0fe;
            color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .cohesion-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 7px;
        }

        .cohesion-high {
            background: #22c55e;
        }

        .cohesion-mid {
            background: #f59e0b;
        }

        .cohesion-low {
            background: #ef4444;
        }

        .cohesion-solo {
            background: #d1d5db;
        }

        .slot-expand-icon {
            margin-left: auto;
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
            align-self: center;
        }

        .orig-pages {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            flex: 1;
        }

        .orig-page {
            background: #f0f0f0;
            border-radius: 4px;
            padding: 2px 7px;
            font-size: 12px;
        }

        .slot-preview {
            display: none;
            flex-wrap: wrap;
            gap: 16px;
            padding: 10px 14px 14px 46px;
            background: #fafbff;
            border-top: 1px dashed var(--line);
        }

        .slot-preview.open {
            display: flex;
        }

        .preview-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .preview-card-title {
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            border-bottom: 1px solid var(--line);
            background: var(--bg);
        }

        .preview-card svg {
            display: block;
        }

        code {
            background: #f0f0f0;
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 12px;
        }

        code.dimmed {
            color: #bbb;
            background: #fafafa;
            border: 1px solid #e8e8e8;
        }

        #empty {
            color: var(--muted);
            font-size: 14px;
            padding: 40px 0;
        }
    </style>
</head>
<body>
<header>
    <h1>Layout Analysis</h1>
    <label id="file-input-label" for="file">📂 Load JSON…</label>
    <input type="file" id="file" accept=".json"/>
    <div id="status">No file loaded — use the button above to open a <code>*-layout.json</code> file.</div>
</header>

<main id="main">
    <div id="empty">Load a JSON file to begin.</div>

    <div id="app" hidden>
        <div class="tabs">
            <button class="tab-btn active" data-tab="families">Template Families</button>
            <button class="tab-btn" data-tab="similarity">Similarity</button>
        </div>

        <!-- Global template filter — applies to all tabs -->
        <div id="filter-bar">
            <label>Templates:</label>
            <div class="filter-anchor">
                <button class="filter-btn" id="filter-btn">All templates ▾</button>
                <div class="filter-panel" id="filter-panel" hidden></div>
            </div>
            <button class="small-link" id="filter-all">all</button>
            <span style="color:var(--muted);font-size:12px">·</span>
            <button class="small-link" id="filter-none">none</button>
        </div>

        <!-- Similarity tab -->
        <div class="tab-panel" id="tab-similarity">
            <div class="section-head">Template similarity</div>
            <p class="section-desc" id="tmpl-matrix-desc"></p>
            <div class="matrix-wrap" id="tmpl-matrix-wrap"></div>

            <div class="section-head">Page similarity</div>
            <p class="section-desc" id="page-matrix-desc"></p>
            <div class="matrix-wrap" id="page-matrix-wrap"></div>
        </div>

        <!-- Families tab -->
        <div class="tab-panel active" id="tab-families">
            <p class="section-desc" id="families-desc"></p>
            <ul class="family-list" id="families-list"></ul>
        </div>
    </div>
</main>

<script>
    const PALETTE = [
        "#4e79a7", "#f28e2b", "#e15759", "#76b7b2", "#59a14f",
        "#edc948", "#b07aa1", "#ff9da7", "#9c755f", "#bab0ac",
        "#aecbeb", "#ffcfa1", "#f4a59d", "#b0dbd8", "#a8d5a2",
    ];

    const CANVAS_W = 180;
    const PAD = 10;
    const CLUSTER_THRESHOLD = 0.60;

    let currentData = null;
    let visibleTemplates = new Set();
    let templateFamilies = [];   // computed from tl.matrix at load time; drives both renderFamilies and pageOrderByFamily

    document.getElementById("file").addEventListener("change", async (e) => {
        const [file] = e.target.files;
        if (!file) return;
        try {
            const data = JSON.parse(await file.text());
            document.getElementById("status").textContent =
                `${file.name}  ·  ${data.pages.length} page(s)  ·  project: ${data.projectName}`;
            render(data);
        } catch (err) {
            document.getElementById("status").textContent = "Error: " + err.message;
        }
    });

    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
        });
    });

    const filterBtn = document.getElementById("filter-btn");
    const filterPanel = document.getElementById("filter-panel");

    filterBtn.addEventListener("click", e => {
        filterPanel.hidden = !filterPanel.hidden;
        e.stopPropagation();
    });
    document.addEventListener("click", () => {
        filterPanel.hidden = true;
    });
    filterPanel.addEventListener("click", e => e.stopPropagation());

    document.getElementById("filter-all").addEventListener("click", () => {
        filterPanel.querySelectorAll("input[type=checkbox]").forEach(cb => {
            cb.checked = true;
            visibleTemplates.add(cb.dataset.id);
        });
        updateFilterBtn();
        if (currentData) rerender();
    });
    document.getElementById("filter-none").addEventListener("click", () => {
        filterPanel.querySelectorAll("input[type=checkbox]").forEach(cb => {
            cb.checked = false;
        });
        visibleTemplates.clear();
        updateFilterBtn();
        if (currentData) rerender();
    });

    function buildFilterPanel(templates) {
        filterPanel.innerHTML = "";
        templates.forEach(t => {
            const label = document.createElement("label");
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.checked = true;
            cb.dataset.id = t.templateId;
            cb.addEventListener("change", () => {
                if (cb.checked) visibleTemplates.add(t.templateId);
                else visibleTemplates.delete(t.templateId);
                updateFilterBtn();
                if (currentData) rerender();
            });
            label.appendChild(cb);
            label.appendChild(document.createTextNode(" " + templateName(t)));
            filterPanel.appendChild(label);
        });
    }

    function updateFilterBtn() {
        const total = currentData?.similarity?.templateLevel?.templates?.length ?? 0;
        filterBtn.textContent = visibleTemplates.size === total
            ? `All templates (${total}) ▾`
            : `${visibleTemplates.size} of ${total} templates ▾`;
    }

    function render(data) {
        currentData = data;
        document.getElementById("empty").hidden = true;
        document.getElementById("app").hidden = false;

        const tl = data.similarity?.templateLevel;
        if (tl) {
            templateFamilies = computeTemplateFamilies(tl);
            visibleTemplates = new Set(tl.templates.map(t => t.templateId));
            buildFilterPanel(tl.templates);
            updateFilterBtn();
        } else {
            document.getElementById("filter-bar").style.display = "none";
        }

        rerender();
    }

    function rerender() {
        renderSimilarity(currentData);
        renderFamilies(currentData);
    }

    function buildPageCard(page) {
        if (!page.areas.length) {
            const card = document.createElement("div");
            card.className = "page-card";
            card.innerHTML =
                `<div class="page-card-title">${htmlEsc(pageName(page))}</div>` +
                `<div class="page-card-sub" style="padding-bottom:12px">No areas</div>`;
            return card;
        }

        const areas = page.areas;
        const maxX2 = Math.max(...areas.map(a => a.x + a.w));
        const maxY2 = Math.max(...areas.map(a => a.y + a.h));
        const scale = (CANVAS_W - 2 * PAD) / Math.max(maxX2, 210);
        const svgH = Math.ceil(maxY2 * scale + 2 * PAD);
        const svg = svgEl("svg", {width: CANVAS_W, height: svgH, style: "background:#fff;cursor:default"});

        (page.proximityGroups || []).forEach((grp, gi) => {
            const b = grp.position;
            svg.appendChild(svgEl("rect", {
                x: svgPos(b.x, scale), y: svgPos(b.y, scale),
                width: svgDim(b.w, scale), height: svgDim(b.h, scale),
                fill: "none", stroke: "#e00", "stroke-width": 1.5, "stroke-dasharray": "5,3"
            }));
            const lbl = svgEl("text", {
                x: svgPos(b.x, scale) + 2, y: svgPos(b.y, scale) - 2,
                "font-size": 7, fill: "#e00", "font-weight": "bold"
            });
            lbl.textContent = `G${gi + 1}`;
            svg.appendChild(lbl);
        });

        areas.forEach((a, i) => {
            const color = PALETTE[i % PALETTE.length];
            const isRoot = a.containedIn == null;
            const rx = svgPos(a.x, scale), ry = svgPos(a.y, scale),
                rw = svgDim(a.w, scale), rh = svgDim(a.h, scale);
            const label = areaLabel(a.contentPreview) || `area_${i}`;
            const tip = `${label}\nx=${a.x}mm  y=${a.y}mm  w=${a.w}mm  h=${a.h}mm`
                + (a.flowToNextPage ? "\n[flowToNextPage]" : "")
                + (a.interactiveFlowName ? `\nflow: ${a.interactiveFlowName}` : "");

            const rect = svgEl("rect", {
                x: rx, y: ry, width: rw, height: rh,
                fill: color, "fill-opacity": "0.32", stroke: color,
                "stroke-width": isRoot ? "1.5" : "1",
                "stroke-dasharray": isRoot ? "none" : "3,2"
            });
            const titleEl = document.createElementNS("http://www.w3.org/2000/svg", "title");
            titleEl.textContent = tip;
            rect.appendChild(titleEl);
            svg.appendChild(rect);

            if (rw > 12 && rh > 8) {
                const txt = svgEl("text", {
                    x: rx + 2,
                    y: ry + 9,
                    "font-size": 6.5,
                    fill: "#222",
                    "pointer-events": "none"
                });
                txt.textContent = label.length > 28 ? label.slice(-28) : label;
                svg.appendChild(txt);
            }
        });

        const tmplInfo = page.templateName
            ? `  ·  tmpl: ${htmlEsc(page.templateName)}` +
            (page.templatePageIndex != null ? ` (pg ${page.templatePageIndex + 1})` : "")
            : "";
        const card = document.createElement("div");
        card.className = "page-card";
        card.innerHTML =
            `<div class="page-card-title">${htmlEsc(pageName(page))}</div>` +
            `<div class="page-card-sub">${areas.length} area(s)${tmplInfo}</div>`;
        card.appendChild(svg);
        return card;
    }

    function renderSimilarity(data) {
        const tl = data.similarity?.templateLevel;
        const pl = data.similarity?.pageLevel || data.similarity;

        const tmplWrap = document.getElementById("tmpl-matrix-wrap");
        const tmplDesc = document.getElementById("tmpl-matrix-desc");
        if (tl) {
            const selectedIndices = tl.templates
                .map((t, i) => visibleTemplates.has(t.templateId) ? i : -1)
                .filter(i => i >= 0);
            if (selectedIndices.length > 0) {
                tmplDesc.textContent =
                    "Compares templates by positional page matching (page 1↔1, 2↔2, …). " +
                    "Templates with different page counts are penalised for unmatched pages. Score 1.0 = identical, 0.0 = nothing in common.";
                buildMatrixTable(tmplWrap,
                    selectedIndices.map(i => templateName(tl.templates[i])),
                    selectedIndices.map(i => selectedIndices.map(j => tl.matrix[i][j])));
            } else {
                tmplDesc.textContent = "";
                tmplWrap.innerHTML = "<p style='color:var(--muted);font-size:13px'>No templates selected.</p>";
            }
        } else {
            tmplDesc.textContent = "";
            tmplWrap.innerHTML = "<p style='color:var(--muted);font-size:13px'>Template-level data not available (old JSON format).</p>";
        }

        const pageWrap = document.getElementById("page-matrix-wrap");
        const pageDesc = document.getElementById("page-matrix-desc");
        let selectedPageIndices = [];

        if (tl && visibleTemplates.size > 0) {
            const seen = new Set();
            tl.templates
                .filter(t => visibleTemplates.has(t.templateId))
                .forEach(t => t.pageIndices.forEach(pi => {
                    if (!seen.has(pi)) {
                        seen.add(pi);
                        selectedPageIndices.push(pi);
                    }
                }));
            selectedPageIndices.sort((a, b) => a - b);
        } else if (!tl) {
            selectedPageIndices = data.pages.map((_, i) => i);
        }

        if (selectedPageIndices.length > 0) {
            const ordered = pageOrderByFamily(data, selectedPageIndices);
            pageDesc.textContent =
                "Compares pages by area structure (x + width normalised to page width, height with 3× tolerance). " +
                "Score 1.0 = identical structure, 0.0 = nothing in common. Pages sorted by proposed family.";
            buildMatrixTable(pageWrap,
                ordered.map(i => pageName(data.pages[i])),
                ordered.map(i => ordered.map(j => pl.matrix[i][j])));
        } else {
            pageDesc.textContent = "";
            pageWrap.innerHTML = "<p style='color:var(--muted);font-size:13px'>No pages to display.</p>";
        }
    }

    function buildMatrixTable(wrap, names, matrix) {
        if (!names.length) {
            wrap.innerHTML = "";
            return;
        }

        const table = document.createElement("table");
        const hrow = table.createTHead().insertRow();
        hrow.insertCell().innerHTML = "<th></th>";
        names.forEach((name, j) => {
            const th = document.createElement("th");
            th.title = name ?? "";
            th.textContent = `${j + 1}`;
            hrow.appendChild(th);
        });

        const tbody = table.createTBody();
        names.forEach((name, i) => {
            const row = tbody.insertRow();
            const th = document.createElement("th");
            th.textContent = `${i + 1}. ${(name ?? "").slice(0, 36)}`;
            row.appendChild(th);
            matrix[i].forEach((score, j) => {
                const td = row.insertCell();
                if (i === j) {
                    td.textContent = "—";
                    td.style.background = "#e8e8e8";
                } else {
                    td.textContent = score.toFixed(2);
                    const g = Math.round(200 * score), r = Math.round(255 * (1 - score));
                    td.style.background = `rgb(${r},${g},80)`;
                    if (score >= CLUSTER_THRESHOLD) td.style.fontWeight = "700";
                }
            });
        });

        wrap.innerHTML = "";
        wrap.appendChild(table);
        const note = document.createElement("p");
        note.style.cssText = "font-size:11px;color:var(--muted);margin-top:6px";
        note.textContent = `Green = high similarity · Bold = same family (≥ ${CLUSTER_THRESHOLD}). Numbers match row/column headers.`;
        wrap.appendChild(note);
    }

    function renderFamilies(data) {
        const tl = data.similarity?.templateLevel;
        const pl = data.similarity?.pageLevel || data.similarity;
        const list = document.getElementById("families-list");
        const desc = document.getElementById("families-desc");
        list.innerHTML = "";

        if (!tl) {
            desc.textContent = "Pages grouped by structural similarity into base-template candidates.";
            clusterPages(data.pages.map((_, i) => i), pl.matrix).forEach((cluster, fi) => {
                const li = document.createElement("li");
                li.innerHTML =
                    `<div class="family-header"><div class="family-header-row1">` +
                    `<span class="proposed-label">Proposed</span>` +
                    `<span class="proposed-id">Base Template ${fi + 1}</span>` +
                    (cluster.length === 1 ? `<span class="muted-note">(unique)</span>` : "") +
                    `</div></div>` +
                    `<div class="family-slots"><div class="family-slot"><div class="slot-row">` +
                    `<span class="orig-pages">${cluster.map(i => `<span class="orig-page">${htmlEsc(pageName(data.pages[i]))}</span>`).join("")}</span>` +
                    `</div></div></div>`;
                list.appendChild(li);
            });
            return;
        }

        desc.textContent =
            "Templates (top) lead to a proposed base template. " +
            "Numbered rows are proposed base template pages — click a row to preview the original pages that would merge into it.";

        const templateById = Object.fromEntries(tl.templates.map(t => [t.templateId, t]));
        let familyIndex = 0;

        templateFamilies.forEach(fam => {
            if (!fam.templateIds.some(id => visibleTemplates.has(id))) return;
            familyIndex++;

            const templates = fam.templateIds.map(id => templateById[id]).filter(Boolean);
            const hasMultipleTemplates = templates.length > 1;
            const pageIndices = templates.flatMap(t => t.pageIndices).sort((a, b) => a - b);
            const clusters = clusterPages(pageIndices, pl.matrix).sort((a, b) => Math.min(...a) - Math.min(...b));

            const pageLabel = pi => {
                const name = pageName(data.pages[pi]);
                const owner = hasMultipleTemplates && templates.find(t => t.pageIndices.includes(pi));
                return owner ? `${templateName(owner)} / ${name}` : name;
            };

            const templateBadges = fam.templateIds.map((id, idx) =>
                `<code${visibleTemplates.has(id) ? "" : ' class="dimmed"'}>${htmlEsc(fam.templateNames[idx] ?? id)}</code>`
            ).join("  ");

            let slotsHtml = '<div class="family-slots">';
            clusters.forEach((cluster, ci) => {
                const slotId = `slot-${familyIndex}-${ci}`;
                const cohesion = minPairScore(cluster, pl.matrix);
                slotsHtml +=
                    `<div class="family-slot">` +
                    `<div class="slot-row" onclick="toggleSlotPreview(this)">` +
                    `<span class="slot-num">${ci + 1}</span>` +
                    `<span class="cohesion-dot ${cohesionClass(cohesion)}" ` +
                    `title="${cohesion !== null ? `Cohesion (min pair): ${cohesion.toFixed(2)}` : "Single page"}"></span>` +
                    `<span class="orig-pages">${cluster.map(pi => `<span class="orig-page">${htmlEsc(pageLabel(pi))}</span>`).join("")}</span>` +
                    `<span class="slot-expand-icon">▶</span>` +
                    `</div>` +
                    `<div class="slot-preview" id="${slotId}"></div>` +
                    `</div>`;
            });
            slotsHtml += "</div>";

            const li = document.createElement("li");
            li.innerHTML =
                `<div class="family-header">` +
                `<div class="family-header-row1">${templateBadges}` +
                `<span style="margin-left:auto;display:flex;align-items:baseline;gap:5px">` +
                `<span class="proposed-label">→ Proposed</span>` +
                `<span class="proposed-id">Base Template ${familyIndex}</span>` +
                (fam.templateIds.length === 1 ? `<span class="muted-note">(unique)</span>` : "") +
                `</span></div>` +
                `<div class="family-header-row2">${clusters.length} page slot(s) · ${pageIndices.length} original page(s) · click a slot to preview</div>` +
                `</div>` + slotsHtml;

            li.querySelectorAll(".family-slot").forEach((slotEl, ci) => {
                slotEl.dataset.pageIndices = JSON.stringify(clusters[ci]);
            });
            list.appendChild(li);
        });

        if (familyIndex === 0) {
            list.innerHTML = "<p style='color:var(--muted);font-size:13px'>No families match the current filter.</p>";
        }
    }

    function toggleSlotPreview(rowEl) {
        const slotEl = rowEl.closest(".family-slot");
        const preview = slotEl.querySelector(".slot-preview");
        const icon = rowEl.querySelector(".slot-expand-icon");
        const isOpen = preview.classList.toggle("open");
        icon.textContent = isOpen ? "▼" : "▶";

        if (isOpen && preview.childElementCount === 0) {
            JSON.parse(slotEl.dataset.pageIndices || "[]").forEach(pi => {
                const wrap = document.createElement("div");
                wrap.className = "preview-card";
                const title = document.createElement("div");
                title.className = "preview-card-title";
                title.textContent = pageName(currentData.pages[pi]);
                wrap.appendChild(title);
                const svg = buildPageCard(currentData.pages[pi]).querySelector("svg");
                if (svg) wrap.appendChild(svg);
                preview.appendChild(wrap);
            });
        }
    }

    /** Reorders page indices so pages in the same family are adjacent — produces diagonal blocks in the similarity matrix. */
    function pageOrderByFamily(data, indices) {
        const tl = data.similarity?.templateLevel;
        if (!tl) return indices;

        const pl = data.similarity?.pageLevel || data.similarity;
        const indexSet = new Set(indices);
        const templateById = Object.fromEntries(tl.templates.map(t => [t.templateId, t]));
        const order = [];
        const seen = new Set();

        templateFamilies.forEach(fam => {
            if (!fam.templateIds.some(id => visibleTemplates.has(id))) return;
            const famIndices = fam.templateIds
                .flatMap(id => templateById[id]?.pageIndices ?? [])
                .filter(pi => indexSet.has(pi))
                .sort((a, b) => a - b);
            clusterPages(famIndices, pl.matrix)
                .sort((a, b) => Math.min(...a) - Math.min(...b))
                .forEach(cluster => cluster.forEach(pi => {
                    if (!seen.has(pi)) {
                        seen.add(pi);
                        order.push(pi);
                    }
                }));
        });
        indices.forEach(pi => {
            if (!seen.has(pi)) order.push(pi);
        });
        return order;
    }

    /** Clusters templates by structural similarity and returns families with templateIds/templateNames. */
    function computeTemplateFamilies(tl) {
        return clusterPages(tl.templates.map((_, i) => i), tl.matrix)
            .map(cluster => ({
                templateIds: cluster.map(i => tl.templates[i].templateId),
                templateNames: cluster.map(i => tl.templates[i].templateName ?? tl.templates[i].templateId),
            }));
    }

    /**
     * Average-linkage agglomerative clustering: merges two clusters when their mean cross-pair
     * similarity meets CLUSTER_THRESHOLD. Avoids the chaining effect of single-linkage.
     */
    function clusterPages(indices, matrix) {
        let clusters = indices.map(i => [i]);
        let changed = true;
        while (changed) {
            changed = false;
            outer: for (let i = 0; i < clusters.length; i++) {
                for (let j = i + 1; j < clusters.length; j++) {
                    const scores = clusters[i].flatMap(a => clusters[j].map(b => matrix[a]?.[b] ?? 0));
                    const avg = scores.reduce((s, v) => s + v, 0) / scores.length;
                    if (avg >= CLUSTER_THRESHOLD) {
                        clusters[i].push(...clusters[j]);
                        clusters.splice(j, 1);
                        changed = true;
                        break outer;
                    }
                }
            }
        }
        return clusters;
    }

    /** Minimum pairwise similarity within a cluster — indicates how tight the grouping is. */
    function minPairScore(cluster, matrix) {
        if (cluster.length < 2) return null;
        let min = 1;
        for (let i = 0; i < cluster.length; i++)
            for (let j = i + 1; j < cluster.length; j++)
                min = Math.min(min, matrix[cluster[i]]?.[cluster[j]] ?? 0);
        return min;
    }

    function cohesionClass(score) {
        if (score === null) return "cohesion-solo";
        if (score >= 0.75) return "cohesion-high";
        if (score >= 0.50) return "cohesion-mid";
        return "cohesion-low";
    }

    function svgEl(tag, attrs) {
        const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
        Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
        return el;
    }

    // svgPos offsets by PAD (use for x/y); svgDim does not (use for width/height)
    function svgPos(mm, scale) {
        return Math.round((mm * scale + PAD) * 10) / 10;
    }

    function svgDim(mm, scale) {
        return Math.round(mm * scale * 10) / 10;
    }

    function areaLabel(preview) {
        if (!preview) return "";
        const m = preview.match(/\(([^)]+)\)$/);
        return m ? m[1] : preview.slice(0, 40);
    }

    function htmlEsc(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function pageName(page) {
        return page.pageName ?? page.pageId;
    }

    function templateName(tmpl) {
        return tmpl.templateName ?? tmpl.templateId;
    }
</script>
</body>
</html>
