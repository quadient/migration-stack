<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Layout Analysis</title>
    <style>
        :root {
            --fg: #111;
            --muted: #666;
            --line: #e6e6e6;
            --bg: #f9f9f9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            margin: 24px;
            color: var(--fg);
            background: #fff;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }

        button, input[type="file"] {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: var(--bg);
            cursor: pointer;
            font-size: 13px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .status {
            font-size: 13px;
            color: #c00;
        }

        /* Layout: split view */
        .split-layout {
            display: flex;
            gap: 24px;
        }

        .families-pane {
            flex: 1;
            min-width: 0;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .similarity-pane {
            flex: 1;
            min-width: 0;
            border-left: 1px solid var(--line);
            padding-left: 24px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .similarity-pane .section-head {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .similarity-pane .close-btn {
            margin-left: auto;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--muted);
            padding: 0 4px;
        }

        /* Matrix */
        .matrix-wrap {
            overflow-x: auto;
        }

        .matrix-wrap table {
            border-collapse: collapse;
            font-size: 12px;
        }

        .matrix-wrap th, .matrix-wrap td {
            padding: 5px 8px;
            border: 1px solid var(--line);
            white-space: nowrap;
        }

        .matrix-wrap th {
            background: var(--bg);
            font-weight: 600;
        }

        .matrix-wrap td {
            text-align: center;
            min-width: 52px;
        }

        .section-head {
            font-size: 13px;
            font-weight: 700;
            margin: 22px 0 6px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 5px;
            color: var(--fg);
        }

        .section-head:first-of-type {
            margin-top: 0;
        }

        /* Family list */
        .family-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .family-list > li {
            margin-bottom: 14px;
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
            transition: opacity 0.2s;
        }

        .family-list > li.dimmed {
            opacity: 0.45;
        }

        .family-header {
            padding: 10px 14px;
            background: var(--bg);
            border-bottom: 1px solid var(--line);
        }

        .family-header-row1 {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .family-header-row1 input[type="checkbox"] {
            margin: 0 4px 0 0;
            cursor: pointer;
        }

        .family-slots {
            padding: 6px 0;
        }

        .family-slot {
            border-bottom: 1px solid var(--line);
        }

        .family-slot:last-child {
            border-bottom: none;
        }

        .slot-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 6px 14px;
            cursor: pointer;
            user-select: none;
        }

        .slot-row:hover {
            background: #f5f8ff;
        }

        .slot-num {
            min-width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #e8f0fe;
            color: #4a7ab5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
            margin-right: 4px;
            cursor: pointer;
            border: 2px solid #a8c4e0;
            transition: background 0.15s, color 0.15s;
        }

        .slot-num.all-selected {
            background: #6b9fd4;
            border-color: #6b9fd4;
            color: #fff;
        }

        .slot-num.none-selected {
            background: #fff;
            border-color: #ccc;
            color: #999;
        }

        .cohesion-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 7px;
        }

        .cohesion-high {
            background: #22c55e;
        }

        .cohesion-mid {
            background: #f59e0b;
        }

        .cohesion-low {
            background: #ef4444;
        }

        .cohesion-solo {
            background: #d1d5db;
        }

        .slot-expand-icon {
            margin-left: auto;
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
            align-self: center;
        }

        .orig-pages {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            flex: 1;
        }

        .orig-page-label {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
        }

        .orig-page-label input[type="checkbox"] {
            margin: 0;
            cursor: pointer;
        }

        .orig-page {
            background: #f0f0f0;
            border-radius: 4px;
            padding: 2px 7px;
            font-size: 12px;
        }

        .slot-preview {
            display: none;
            flex-wrap: wrap;
            gap: 16px;
            padding: 10px 14px 14px 46px;
            background: #fafbff;
            border-top: 1px dashed var(--line);
        }

        .slot-preview.open {
            display: flex;
        }

        .preview-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .preview-card-title {
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            border-bottom: 1px solid var(--line);
            background: var(--bg);
        }

        .preview-card svg {
            display: block;
        }

        code {
            background: #f0f0f0;
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button id="similarity-btn" disabled>Show similarity</button>
    <button id="select-all">Select all</button>
    <button id="select-none">Deselect all</button>
    <input type="file" id="file" accept=".json"/>
    <div class="status" id="status"></div>
</div>

<div id="app" hidden>
    <div class="split-layout">
        <div class="families-pane">
            <ul class="family-list" id="families-list"></ul>
        </div>
        <div class="similarity-pane" id="similarity-pane" hidden>
            <div class="section-head">
                Template similarity
                <button class="close-btn" id="similarity-close" title="Close">&times;</button>
            </div>
            <div class="matrix-wrap" id="tmpl-matrix-wrap"></div>

            <div class="section-head">Page similarity</div>
            <div class="matrix-wrap" id="page-matrix-wrap"></div>
        </div>
    </div>
</div>

<script type="module">
// @ts-check

/**
 * @typedef {Object} LayoutData
 * @property {string} projectName
 * @property {PageEntry[]} pages
 * @property {Similarity} similarity
 */

/**
 * @typedef {Object} Similarity
 * @property {PageLevel} pageLevel
 * @property {TemplateLevel} templateLevel
 */

/**
 * @typedef {Object} PageLevel
 * @property {number[][]} matrix
 */

/**
 * @typedef {Object} TemplateLevel
 * @property {TemplateEntry[]} templates
 * @property {number[][]} matrix
 */

/**
 * @typedef {Object} TemplateEntry
 * @property {string} templateId
 * @property {string} templateName
 * @property {number[]} pageIndices
 */

/**
 * @typedef {Object} PageEntry
 * @property {string} pageId
 * @property {string} pageName
 * @property {string|null} templateId
 * @property {string|null} templateName
 * @property {number|null} templatePageIndex
 * @property {AreaEntry[]} areas
 * @property {ProximityGroup[]} proximityGroups
 */

/**
 * @typedef {Object} AreaEntry
 * @property {number} x
 * @property {number} y
 * @property {number} w
 * @property {number} h
 * @property {boolean} flowToNextPage
 * @property {string} interactiveFlowName
 * @property {string} contentPreview
 * @property {number|null} containedIn
 * @property {number} proximityGroup
 */

/**
 * @typedef {Object} ProximityGroup
 * @property {number[]} areaIndices
 * @property {Position} position
 */

/**
 * @typedef {Object} Position
 * @property {number} x
 * @property {number} y
 * @property {number} w
 * @property {number} h
 */

/**
 * @typedef {Object} TemplateFamily
 * @property {string[]} templateIds
 * @property {string[]} templateNames
 */

/** @type {string[]} */
const PALETTE = [
    "#4e79a7", "#f28e2b", "#e15759", "#76b7b2", "#59a14f",
    "#edc948", "#b07aa1", "#ff9da7", "#9c755f", "#bab0ac",
    "#aecbeb", "#ffcfa1", "#f4a59d", "#b0dbd8", "#a8d5a2",
];

const CANVAS_W = 400;
const PAD = 10;
const CLUSTER_THRESHOLD = 0.60;

/** @type {LayoutData|null} */
let currentData = null;
/** @type {TemplateFamily[]} */
let templateFamilies = [];
/** @type {Record<string, TemplateEntry>} */
let templateById = {};
/** @type {Set<number>} - indices into templateFamilies that are selected */
let selectedFamilies = new Set();
/** @type {Set<number>} - global page indices that are selected (for similarity) */
let selectedPages = new Set();
/** @type {Map<number, string>} - global page index → stable display label (e.g. "2a.1") */
let pageNumberMap = new Map();

const statusEl = /** @type {HTMLElement} */ (document.getElementById("status"));
const fileInput = /** @type {HTMLInputElement} */ (document.getElementById("file"));
const similarityBtn = /** @type {HTMLButtonElement} */ (document.getElementById("similarity-btn"));
const similarityPane = /** @type {HTMLElement} */ (document.getElementById("similarity-pane"));

/**
 * @param {File} file
 */
async function loadFile(file) {
    try {
        /** @type {LayoutData} */
        const data = JSON.parse(await file.text());
        statusEl.textContent = "";
        render(data);
    } catch (err) {
        statusEl.textContent = "Error: " + /** @type {Error} */ (err).message;
    }
}

fileInput.addEventListener("change", () => {
    const [file] = /** @type {FileList} */ (fileInput.files);
    if (file) loadFile(file);
});

document.body.addEventListener("dragover", e => e.preventDefault());
document.body.addEventListener("drop", e => {
    e.preventDefault();
    const file = e.dataTransfer?.files[0];
    if (file) loadFile(file);
});

document.getElementById("select-all").addEventListener("click", () => {
    templateFamilies.forEach((_, i) => selectedFamilies.add(i));
    updateFamilyCheckboxes();
    updateToolbarState();
    if (!similarityPane.hidden) renderSimilarity();
});

document.getElementById("select-none").addEventListener("click", () => {
    selectedFamilies.clear();
    updateFamilyCheckboxes();
    updateToolbarState();
    if (!similarityPane.hidden) renderSimilarity();
});

similarityBtn.addEventListener("click", () => {
    if (similarityPane.hidden) {
        similarityPane.hidden = false;
        renderSimilarity();
    } else {
        similarityPane.hidden = true;
    }
});

document.getElementById("similarity-close").addEventListener("click", () => {
    similarityPane.hidden = true;
});

/** @returns {void} */
function updateToolbarState() {
    const hasData = currentData != null;
    similarityBtn.disabled = !hasData;
    document.getElementById("select-all").disabled = !hasData;
    document.getElementById("select-none").disabled = !hasData;
}

/** @returns {void} */
function updateFamilyCheckboxes() {
    document.querySelectorAll("#families-list > li").forEach((li, i) => {
        const cb = /** @type {HTMLInputElement|null} */ (li.querySelector("input[type=checkbox]"));
        if (cb) cb.checked = selectedFamilies.has(i);
        li.classList.toggle("dimmed", !selectedFamilies.has(i));
    });
}

/**
 * @param {LayoutData} data
 */
function render(data) {
    currentData = data;
    document.getElementById("app").hidden = false;
    similarityPane.hidden = true;

    const templateLevel = data.similarity.templateLevel;
    templateById = Object.fromEntries(templateLevel.templates.map(t => [t.templateId, t]));
    templateFamilies = computeTemplateFamilies(templateLevel);
    selectedFamilies = new Set(templateFamilies.map((_, i) => i));
    selectedPages = new Set(templateLevel.templates.flatMap(t => t.pageIndices));

    // Build stable page numbering scoped per template (e.g. "2a.1", "2a.2", "3.1")
    pageNumberMap = new Map();
    const {pageLevel} = data.similarity;
    templateFamilies.forEach((fam, fi) => {
        const famTemplates = fam.templateIds.map(id => templateById[id]).filter(Boolean);
        famTemplates.forEach((tmpl, tidx) => {
            const prefix = familyPrefix(fi, fam, tidx);
            const tmplPages = [...tmpl.pageIndices].sort((a, b) => a - b);
            tmplPages.forEach((pi, pageIdx) => {
                if (!pageNumberMap.has(pi)) {
                    pageNumberMap.set(pi, `${prefix}.${pageIdx + 1}`);
                }
            });
        });
    });

    renderFamilies(data);
    updateToolbarState();
}

/**
 * @param {PageEntry} page
 * @returns {SVGElement|null}
 */
function buildPageSvg(page) {
    const areas = page.areas;
    if (!areas.length) return null;

    const maxX2 = Math.max(...areas.map(a => a.x + a.w));
    const maxY2 = Math.max(...areas.map(a => a.y + a.h));
    const scale = (CANVAS_W - 2 * PAD) / Math.max(maxX2, 210);
    const svgH = Math.ceil(maxY2 * scale + 2 * PAD);
    const svg = svgEl("svg", {width: CANVAS_W, height: svgH, style: "background:#fff;cursor:default"});

    (page.proximityGroups || []).forEach((group, i) => {
        const position = group.position;
        svg.appendChild(svgEl("rect", {
            x: svgPos(position.x, scale), y: svgPos(position.y, scale),
            width: svgDim(position.w, scale), height: svgDim(position.h, scale),
            fill: "none", stroke: "#e00", "stroke-width": 1.5, "stroke-dasharray": "5,3"
        }));
        const lbl = svgEl("text", {
            x: svgPos(position.x, scale) + 2, y: svgPos(position.y, scale) - 2,
            "font-size": 7, fill: "#e00", "font-weight": "bold"
        });
        lbl.textContent = `G${i + 1}`;
        svg.appendChild(lbl);
    });

    areas.forEach((a, i) => {
        const color = PALETTE[i % PALETTE.length];
        const isRoot = a.containedIn == null;
        const rx = svgPos(a.x, scale), ry = svgPos(a.y, scale),
            rw = svgDim(a.w, scale), rh = svgDim(a.h, scale);
        const label = areaLabel(a.contentPreview) || `area_${i}`;
        const tip = `${label}\nx=${a.x}mm  y=${a.y}mm  w=${a.w}mm  h=${a.h}mm`
            + (a.flowToNextPage ? "\n[flowToNextPage]" : "")
            + (a.interactiveFlowName ? `\nflow: ${a.interactiveFlowName}` : "");

        const rect = svgEl("rect", {
            x: rx, y: ry, width: rw, height: rh,
            fill: color, "fill-opacity": "0.32", stroke: color,
            "stroke-width": isRoot ? "1.5" : "1",
            "stroke-dasharray": isRoot ? "none" : "3,2"
        });
        const titleEl = document.createElementNS("http://www.w3.org/2000/svg", "title");
        titleEl.textContent = tip;
        rect.appendChild(titleEl);
        svg.appendChild(rect);

        if (rw > 12 && rh > 8) {
            const txt = svgEl("text", {
                x: rx + 2,
                y: ry + 9,
                "font-size": 6.5,
                fill: "#222",
                "pointer-events": "none"
            });
            txt.textContent = label.length > 28 ? label.slice(-28) : label;
            svg.appendChild(txt);
        }
    });

    return svg;
}

/** @returns {void} */
function renderSimilarity() {
    const {templateLevel, pageLevel} = currentData.similarity;

    const templateWrap = /** @type {HTMLElement} */ (document.getElementById("tmpl-matrix-wrap"));
    const pageWrap = /** @type {HTMLElement} */ (document.getElementById("page-matrix-wrap"));

    /** @type {number[]} */
    const selectedTemplateIndices = [];
    /** @type {string[]} */
    const templateLabels = [];
    /** @type {string[]} */
    const templateColHeaders = [];
    selectedFamilies.forEach(fi => {
        const fam = templateFamilies[fi];
        fam.templateIds.forEach((id, idx) => {
            const ti = templateLevel.templates.findIndex(t => t.templateId === id);
            if (ti >= 0) {
                selectedTemplateIndices.push(ti);
                const shortId = familyPrefix(fi, fam, idx);
                templateLabels.push(`${shortId}. ${templateName(templateLevel.templates[ti])}`);
                templateColHeaders.push(shortId);
            }
        });
    });

    if (selectedTemplateIndices.length > 0) {
        buildMatrixTable(templateWrap, templateLabels, templateColHeaders,
            selectedTemplateIndices.map(i => selectedTemplateIndices.map(j => templateLevel.matrix[i][j])));
    } else {
        templateWrap.innerHTML = "<p style='color:var(--muted);font-size:13px'>No templates selected.</p>";
    }

    /** @type {number[]} */
    const selectedPageIndices = [...new Set(
        selectedTemplateIndices.flatMap(i => templateLevel.templates[i].pageIndices)
    )].filter(pi => selectedPages.has(pi)).sort((a, b) => a - b);

    if (selectedPageIndices.length > 0) {
        const ordered = pageOrderByFamily(selectedPageIndices);
        const pageLabels = ordered.map(pi => `${pageNumberMap.get(pi)} ${pageName(currentData.pages[pi])}`);
        const pageColHeaders = ordered.map(pi => `${pageNumberMap.get(pi)}`);
        buildMatrixTable(pageWrap, pageLabels, pageColHeaders,
            ordered.map(i => ordered.map(j => pageLevel.matrix[i][j])));
    } else {
        pageWrap.innerHTML = "<p style='color:var(--muted);font-size:13px'>No pages to display.</p>";
    }
}

/**
 * @param {HTMLElement} wrap
 * @param {string[]} labels - row labels (displayed in row header cells as-is)
 * @param {string[]} colHeaders - short column headers
 * @param {number[][]} matrix
 */
function buildMatrixTable(wrap, labels, colHeaders, matrix) {
    if (!labels.length) {
        wrap.innerHTML = "";
        return;
    }

    const table = document.createElement("table");
    const headerRow = table.createTHead().insertRow();
    headerRow.appendChild(document.createElement("th"));
    colHeaders.forEach((col, j) => {
        const th = document.createElement("th");
        th.title = labels[j] ?? "";
        th.textContent = col;
        headerRow.appendChild(th);
    });

    const body = table.createTBody();
    labels.forEach((label, i) => {
        const row = body.insertRow();
        const headerCell = document.createElement("th");
        headerCell.textContent = (label ?? "").slice(0, 42);
        row.appendChild(headerCell);
        matrix[i].forEach((score, j) => {
            const cell = row.insertCell();
            if (i === j) {
                cell.textContent = "\u2014";
                cell.style.background = "#e8e8e8";
            } else {
                cell.textContent = score.toFixed(2);
                const g = Math.round(200 * score), r = Math.round(255 * (1 - score));
                cell.style.background = `rgb(${r},${g},80)`;
                if (score >= CLUSTER_THRESHOLD) cell.style.fontWeight = "700";
            }
        });
    });

    wrap.innerHTML = "";
    wrap.appendChild(table);
}

/**
 * @param {LayoutData} data
 */
function renderFamilies(data) {
    const {pageLevel} = data.similarity;
    const familyList = /** @type {HTMLElement} */ (document.getElementById("families-list"));
    familyList.innerHTML = "";

    templateFamilies.forEach((fam, familyIndex) => {
        const templates = fam.templateIds.map(id => templateById[id]).filter(Boolean);
        /** @type {number[]} */
        const pageIndices = templates.flatMap(t => t.pageIndices).sort((a, b) => a - b);
        const clusters = clusterPages(pageIndices, pageLevel.matrix)
            .map(c => c.sort((a, b) => a - b))
            .sort((a, b) => Math.min(...a) - Math.min(...b));

        const templateBadges = fam.templateIds.map((id, idx) =>
            `<code><strong>${familyPrefix(familyIndex, fam, idx)}.</strong> ${htmlEsc(fam.templateNames[idx] ?? id)}</code>`
        ).join("  ");

        let slotsHtml = '<div class="family-slots">';
        clusters.forEach((cluster, ci) => {
            const cohesion = minPairScore(cluster, pageLevel.matrix);
            const checkedCount = cluster.filter(pi => selectedPages.has(pi)).length;
            const slotState = checkedCount === cluster.length ? "all-selected" : checkedCount === 0 ? "none-selected" : "";
            slotsHtml +=
                `<div class="family-slot">` +
                `<div class="slot-row" data-action="toggle-preview">` +
                `<span class="slot-num ${slotState}" data-action="toggle-slot">${ci + 1}</span>` +
                `<span class="cohesion-dot ${cohesionClass(cohesion)}" ` +
                `title="${cohesion !== null ? `Cohesion (min pair): ${cohesion.toFixed(2)}` : "Single page"}"></span>` +
                `<span class="orig-pages">${cluster.map(pi =>
                    `<label class="orig-page-label"><input type="checkbox" data-page="${pi}" ${selectedPages.has(pi) ? "checked" : ""}/><span class="orig-page"><strong>${pageNumberMap.get(pi)}</strong> ${htmlEsc(pageName(data.pages[pi]))}</span></label>`
                ).join("")}</span>` +
                `<span class="slot-expand-icon">&#9654;</span>` +
                `</div>` +
                `<div class="slot-preview"></div>` +
                `</div>`;
        });
        slotsHtml += "</div>";

        const li = document.createElement("li");
        li.dataset.familyIndex = String(familyIndex);
        li.innerHTML =
            `<div class="family-header">` +
            `<div class="family-header-row1">` +
            `<input type="checkbox" checked data-family="${familyIndex}"/>` +
            `${templateBadges}` +
            `</div>` +
            `</div>` + slotsHtml;

        li.querySelectorAll(".family-slot").forEach((slotEl, ci) => {
            /** @type {HTMLElement} */ (slotEl).dataset.pageIndices = JSON.stringify(clusters[ci]);
        });
        familyList.appendChild(li);
    });
}

/**
 * Updates slot number visual state based on checked pages in the slot.
 * @param {HTMLElement} slotNumEl
 * @param {HTMLElement} slotEl
 */
function updateSlotNumState(slotNumEl, slotEl) {
    const checkboxes = /** @type {NodeListOf<HTMLInputElement>} */ (slotEl.querySelectorAll("input[data-page]"));
    const checkedCount = [...checkboxes].filter(cb => cb.checked).length;
    slotNumEl.classList.toggle("all-selected", checkedCount === checkboxes.length);
    slotNumEl.classList.toggle("none-selected", checkedCount === 0);
}

// Event delegation for family checkboxes
document.getElementById("families-list").addEventListener("change", (e) => {
    const cb = /** @type {HTMLInputElement} */ (e.target);
    if (cb.type !== "checkbox") return;
    if (cb.dataset.family != null) {
        const fi = parseInt(cb.dataset.family);
        if (cb.checked) selectedFamilies.add(fi);
        else selectedFamilies.delete(fi);
        cb.closest("li").classList.toggle("dimmed", !cb.checked);
        updateToolbarState();
    } else if (cb.dataset.page != null) {
        const pi = parseInt(cb.dataset.page);
        if (cb.checked) selectedPages.add(pi);
        else selectedPages.delete(pi);
        // Hide/show corresponding preview cards
        document.querySelectorAll(`.preview-card[data-page-index="${pi}"]`).forEach(card => {
            /** @type {HTMLElement} */ (card).hidden = !cb.checked;
        });
        // Update slot number state
        const slotEl = /** @type {HTMLElement} */ (cb.closest(".family-slot"));
        const slotNum = /** @type {HTMLElement} */ (slotEl.querySelector(".slot-num"));
        updateSlotNumState(slotNum, slotEl);
    }
    if (!similarityPane.hidden) renderSimilarity();
});

// Event delegation for slot preview toggle and slot number toggle
document.getElementById("families-list").addEventListener("click", (e) => {
    const target = /** @type {HTMLElement} */ (e.target);
    if (target.type === "checkbox" || target.closest(".orig-page-label")) return;

    // Slot number click — toggle all page checkboxes in this slot
    if (target.dataset.action === "toggle-slot") {
        e.stopPropagation();
        const slotEl = /** @type {HTMLElement} */ (target.closest(".family-slot"));
        const checkboxes = /** @type {NodeListOf<HTMLInputElement>} */ (slotEl.querySelectorAll("input[data-page]"));
        const allChecked = [...checkboxes].every(cb => cb.checked);
        checkboxes.forEach(cb => {
            cb.checked = !allChecked;
            const pi = parseInt(cb.dataset.page);
            if (cb.checked) selectedPages.add(pi);
            else selectedPages.delete(pi);
        });
        updateSlotNumState(target, slotEl);
        // Update preview card visibility
        slotEl.querySelectorAll(".preview-card").forEach(card => {
            const pi = parseInt(/** @type {HTMLElement} */ (card).dataset.pageIndex);
            /** @type {HTMLElement} */ (card).hidden = !selectedPages.has(pi);
        });
        if (!similarityPane.hidden) renderSimilarity();
        return;
    }

    const row = /** @type {HTMLElement|null} */ (target.closest("[data-action='toggle-preview']"));
    if (!row) return;
    toggleSlotPreview(row);
});

/**
 * @param {HTMLElement} rowEl
 */
function toggleSlotPreview(rowEl) {
    const slotEl = /** @type {HTMLElement} */ (rowEl.closest(".family-slot"));
    const preview = /** @type {HTMLElement} */ (slotEl.querySelector(".slot-preview"));
    const icon = /** @type {HTMLElement} */ (rowEl.querySelector(".slot-expand-icon"));
    const isOpen = preview.classList.toggle("open");
    icon.textContent = isOpen ? "\u25BC" : "\u25B6";

    if (isOpen && preview.childElementCount === 0) {
        /** @type {number[]} */
        const indices = JSON.parse(slotEl.dataset.pageIndices || "[]");
        indices.forEach(pi => {
            const wrap = document.createElement("div");
            wrap.className = "preview-card";
            wrap.dataset.pageIndex = String(pi);
            if (!selectedPages.has(pi)) wrap.hidden = true;
            const title = document.createElement("div");
            title.className = "preview-card-title";
            title.textContent = pageName(currentData.pages[pi]);
            wrap.appendChild(title);
            const svg = buildPageSvg(currentData.pages[pi]);
            if (svg) wrap.appendChild(svg);
            preview.appendChild(wrap);
        });
    }
}

/**
 * Reorders page indices so pages in the same family are adjacent.
 * @param {number[]} indices
 * @returns {number[]}
 */
function pageOrderByFamily(indices) {
    const {pageLevel} = currentData.similarity;
    /** @type {Set<number>} */
    const indexSet = new Set(indices);
    /** @type {number[]} */
    const order = [];
    /** @type {Set<number>} */
    const seen = new Set();

    templateFamilies.forEach((fam, fi) => {
        if (!selectedFamilies.has(fi)) return;
        const famIndices = fam.templateIds
            .flatMap(id => templateById[id]?.pageIndices ?? [])
            .filter(pi => indexSet.has(pi))
            .sort((a, b) => a - b);
        clusterPages(famIndices, pageLevel.matrix)
            .sort((a, b) => Math.min(...a) - Math.min(...b))
            .forEach(cluster => cluster.forEach(pi => {
                if (!seen.has(pi)) {
                    seen.add(pi);
                    order.push(pi);
                }
            }));
    });
    indices.forEach(pi => {
        if (!seen.has(pi)) order.push(pi);
    });
    return order;
}

/**
 * Returns a short prefix for a template within a family (e.g. "2a" or "3").
 * @param {number} familyIndex
 * @param {TemplateFamily} fam
 * @param {number} templateIndex - index within the family's templateIds
 * @returns {string}
 */
function familyPrefix(familyIndex, fam, templateIndex) {
    const num = familyIndex + 1;
    const letter = fam.templateIds.length > 1 ? String.fromCharCode(97 + templateIndex) : "";
    return `${num}${letter}`;
}

/**
 * @param {TemplateLevel} tl
 * @returns {TemplateFamily[]}
 */
function computeTemplateFamilies(tl) {
    return clusterPages(tl.templates.map((_, i) => i), tl.matrix)
        .map(cluster => ({
            templateIds: cluster.map(i => tl.templates[i].templateId),
            templateNames: cluster.map(i => tl.templates[i].templateName ?? tl.templates[i].templateId),
        }));
}

/**
 * Average-linkage agglomerative clustering.
 * @param {number[]} indices
 * @param {number[][]} matrix
 * @returns {number[][]}
 */
function clusterPages(indices, matrix) {
    /** @type {number[][]} */
    let clusters = indices.map(i => [i]);
    let changed = true;
    while (changed) {
        changed = false;
        outer: for (let i = 0; i < clusters.length; i++) {
            for (let j = i + 1; j < clusters.length; j++) {
                const scores = clusters[i].flatMap(a => clusters[j].map(b => matrix[a]?.[b] ?? 0));
                const avg = scores.reduce((s, v) => s + v, 0) / scores.length;
                if (avg >= CLUSTER_THRESHOLD) {
                    clusters[i].push(...clusters[j]);
                    clusters.splice(j, 1);
                    changed = true;
                    break outer;
                }
            }
        }
    }
    return clusters;
}

/**
 * @param {number[]} cluster
 * @param {number[][]} matrix
 * @returns {number|null}
 */
function minPairScore(cluster, matrix) {
    if (cluster.length < 2) return null;
    let min = 1;
    for (let i = 0; i < cluster.length; i++)
        for (let j = i + 1; j < cluster.length; j++)
            min = Math.min(min, matrix[cluster[i]]?.[cluster[j]] ?? 0);
    return min;
}

/**
 * @param {number|null} score
 * @returns {string}
 */
function cohesionClass(score) {
    if (score === null) return "cohesion-solo";
    if (score >= 0.75) return "cohesion-high";
    if (score >= 0.50) return "cohesion-mid";
    return "cohesion-low";
}

/**
 * @param {string} tag
 * @param {Record<string, string|number>} attrs
 * @returns {SVGElement}
 */
function svgEl(tag, attrs) {
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, String(v)));
    return el;
}

/**
 * @param {number} mm
 * @param {number} scale
 * @returns {number}
 */
function svgPos(mm, scale) {
    return Math.round((mm * scale + PAD) * 10) / 10;
}

/**
 * @param {number} mm
 * @param {number} scale
 * @returns {number}
 */
function svgDim(mm, scale) {
    return Math.round(mm * scale * 10) / 10;
}

/**
 * @param {string} preview
 * @returns {string}
 */
function areaLabel(preview) {
    if (!preview) return "";
    const m = preview.match(/\(([^)]+)\)$/);
    return m ? m[1] : preview.slice(0, 40);
}

/**
 * @param {string} s
 * @returns {string}
 */
function htmlEsc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

/**
 * @param {PageEntry} page
 * @returns {string}
 */
function pageName(page) {
    return page.pageName ?? page.pageId;
}

/**
 * @param {TemplateEntry} tmpl
 * @returns {string}
 */
function templateName(tmpl) {
    return tmpl.templateName ?? tmpl.templateId;
}
</script>
